<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中智力測驗模擬題（題庫 400 題）</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2937; --muted:#6b7280;
    --brand:#3b56d4; --brand2:#5b8def;
    --ok:#16a34a; --okbg:#e8f7ee; --no:#dc2626; --nobg:#fdeaea;
    --line:#e5e7eb; --chip:#eef2ff; --shadow:0 6px 24px rgba(30,41,59,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:20px 16px 80px}
  header.top{background:linear-gradient(135deg,#3b56d4,#5b8def);color:#fff;
    border-radius:18px;padding:26px 24px;box-shadow:var(--shadow)}
  header.top h1{margin:0 0 6px;font-size:24px;letter-spacing:1px}
  header.top h1 .byline{display:inline-block;font-size:14px;font-weight:600;
    background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);
    padding:3px 12px;border-radius:999px;letter-spacing:.5px;vertical-align:4px;white-space:nowrap}
  header.top p{margin:0;opacity:.92;font-size:14px}
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .meta .pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
    padding:5px 12px;border-radius:999px;font-size:13px}
  .bar{position:sticky;top:0;z-index:20;background:rgba(244,246,251,.92);
    backdrop-filter:blur(6px);margin:14px -16px 0;padding:10px 16px;
    display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line)}
  .bar .prog{flex:1;height:8px;background:#e3e8f3;border-radius:999px;overflow:hidden}
  .bar .prog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#3b56d4,#5b8def);transition:width .3s}
  .bar .stat{font-size:13px;color:var(--muted);white-space:nowrap}
  .bar .timer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--brand)}
  .prset{margin:10px 4px 0;font-size:13px;color:var(--muted);background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:8px 14px}
  .prset summary{cursor:pointer;color:var(--brand);font-weight:700}
  .prset .row{margin-top:8px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
  .prset label{display:inline-flex;align-items:center;gap:6px}
  .prset input{width:64px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:14px}
  .secttl{margin:26px 4px 8px;font-size:15px;font-weight:800;color:var(--brand);
    display:flex;align-items:center;gap:8px}
  .secttl span{background:var(--chip);color:var(--brand);font-size:12px;
    padding:2px 10px;border-radius:999px;font-weight:700}
  .q{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 18px 14px;margin:12px 0;box-shadow:var(--shadow)}
  .q .stem{font-size:16px;font-weight:600;margin-bottom:6px}
  .q .num{display:inline-flex;min-width:26px;height:26px;align-items:center;
    justify-content:center;background:var(--brand);color:#fff;border-radius:8px;
    font-size:13px;font-weight:700;margin-right:8px;vertical-align:2px}
  .figrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:12px 0 4px}
  .figrow .cell{width:64px;height:64px;border:1px solid var(--line);border-radius:10px;
    display:flex;align-items:center;justify-content:center;background:#fafbff;color:var(--ink)}
  .figrow .cell svg{width:54px;height:54px}
  .figrow .qmark{font-size:30px;font-weight:800;color:var(--brand)}
  .figrow .arrow{color:var(--muted);font-size:20px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  @media(max-width:520px){.opts{grid-template-columns:1fr}}
  .opt{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);
    border-radius:12px;padding:10px 12px;cursor:pointer;background:#fff;
    transition:.15s;user-select:none;min-height:48px}
  .opt:hover{border-color:var(--brand2);background:#f7f9ff}
  .opt .ltr{width:24px;height:24px;border-radius:50%;background:var(--chip);
    color:var(--brand);font-weight:700;font-size:13px;display:flex;
    align-items:center;justify-content:center;flex:0 0 auto}
  .opt.sel{border-color:var(--brand);background:#eef2ff;box-shadow:0 0 0 2px #c8d3fb inset}
  .opt.sel .ltr{background:var(--brand);color:#fff}
  .opt svg{width:46px;height:46px;color:var(--ink)}
  .opt .txt{font-size:15px}
  .graded .opt{cursor:default}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .ltr{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--no);background:var(--nobg)}
  .opt.wrong .ltr{background:var(--no);color:#fff}
  .exp{display:none;margin-top:12px;border-top:1px dashed var(--line);padding-top:10px;
    font-size:14px;color:#374151}
  .exp b{color:var(--ok)}
  .exp.bad b{color:var(--no)}
  .graded .exp{display:block}
  .submit{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
    padding:12px 16px;display:flex;gap:12px;justify-content:center;z-index:30;
    box-shadow:0 -4px 18px rgba(0,0,0,.06)}
  .btn{border:none;border-radius:12px;padding:13px 26px;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--brand);color:#fff}
  .btn.primary:disabled{background:#b9c2e8;cursor:not-allowed}
  .btn.ghost{background:#eef2ff;color:var(--brand)}
  .result{display:none;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:24px;margin:14px 0;text-align:center;box-shadow:var(--shadow)}
  .result.show{display:block}
  .result .score{font-size:46px;font-weight:800;color:var(--brand);line-height:1.2}
  .result .score small{font-size:18px;color:var(--muted);font-weight:600}
  .result .grade{font-size:18px;font-weight:700;margin:6px 0}
  .result .pr{margin:14px 0 4px;font-size:16px}
  .result .pr b{font-size:34px;color:var(--brand);vertical-align:-4px}
  .result .prnote{font-size:12px;color:var(--muted);margin-top:2px}
  .break{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;text-align:left}
  @media(max-width:520px){.break{grid-template-columns:1fr 1fr}}
  .break .b{background:#f7f9ff;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .break .b .t{font-size:13px;color:var(--muted)}
  .break .b .v{font-size:20px;font-weight:800;color:var(--brand)}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>國中智力測驗 — 模擬試題　<span class="byline">Cheney Lai 專用</span></h1>
    <p>四大向度 · 語文推理｜數量推理｜圖形推理｜邏輯推理</p>
    <div class="meta">
      <span class="pill">題庫每類 100 題</span>
      <span class="pill">每次隨機抽 50 題</span>
      <span class="pill">含 PR 值估計</span>
    </div>
  </header>

  <div class="bar">
    <div class="prog"><i id="progBar"></i></div>
    <div class="stat">已作答 <b id="doneN">0</b>/<span id="totalN">50</span></div>
    <div class="stat timer" id="timer">00:00</div>
  </div>

  <details class="prset" id="prset">
    <summary>PR 值估計設定</summary>
    <div class="row">
      <label>平均分 <input id="prMean" type="number" min="0" max="100" value="70"></label>
      <label>標準差 <input id="prSd" type="number" min="1" max="50" value="15"></label>
      <span>依常態分布換算 PR（1–99），為估計值僅供參考</span>
    </div>
  </details>

  <div class="result" id="result"></div>
  <div id="quiz"></div>

  <footer>本測驗為練習用模擬題，題型參考國民中學智力測驗與多元性向測驗之標準向度編製。題庫每向度 100 題，每次作答隨機抽題並打亂選項。</footer>
</div>

<div class="submit">
  <button class="btn primary" id="submitBtn">交卷看成績</button>
  <button class="btn ghost" id="resetBtn" style="display:none">再做一次（重新抽題）</button>
</div>

<script>
/* ===== 圖形產生器 ===== */
function genPoly(sides,rot){let p=[];for(let i=0;i<sides;i++){let a=(rot+i*360/sides)*Math.PI/180;p.push((30+20*Math.cos(a)).toFixed(1)+","+(30+20*Math.sin(a)).toFixed(1));}return p.join(" ");}
function svgWrap(inner){return '<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';}
function spec2svg(s){
  if(s.q) return '<span class="qmark">？</span>';
  let c='currentColor';
  if(s.arrow!==undefined){
    return svgWrap('<g transform="rotate('+s.arrow+' 30 30)"><line x1="30" y1="52" x2="30" y2="15" stroke="'+c+'" stroke-width="4" stroke-linecap="round"/><polygon points="30,6 21,21 39,21" fill="'+c+'"/></g>');
  }
  if(s.poly!==undefined){
    let pts;
    if(s.poly==='square') return svgWrap('<rect x="12" y="12" width="36" height="36" fill="none" stroke="'+c+'" stroke-width="3"/>');
    if(s.poly==='rect') return svgWrap('<rect x="7" y="18" width="46" height="24" fill="none" stroke="'+c+'" stroke-width="3"/>');
    if(s.poly==='rhombus') pts=genPoly(4,-90);
    else if(s.poly==='tri') pts=genPoly(3,-90);
    else if(s.poly==='penta') pts=genPoly(5,-90);
    else if(s.poly==='hexa') pts=genPoly(6,-90);
    else if(s.poly==='hepta') pts=genPoly(7,-90);
    else if(s.poly==='octa') pts=genPoly(8,-90);
    return svgWrap('<polygon points="'+pts+'" fill="none" stroke="'+c+'" stroke-width="3"/>');
  }
  if(s.dots!==undefined){
    let n=s.dots,inner='<rect x="6" y="14" width="48" height="32" rx="5" fill="none" stroke="'+c+'" stroke-width="2"/>';
    for(let i=0;i<n;i++){let x=30+(i-(n-1)/2)*12;inner+='<circle cx="'+x.toFixed(1)+'" cy="30" r="4" fill="'+c+'"/>';}
    return svgWrap(inner);
  }
  if(s.grid!==undefined){
    let cells=[[6,6],[30,6],[30,30],[6,30]],cc=cells[s.grid];
    let inner='<rect x="'+cc[0]+'" y="'+cc[1]+'" width="24" height="24" fill="'+c+'"/>';
    inner+='<rect x="6" y="6" width="48" height="48" fill="none" stroke="'+c+'" stroke-width="2"/>';
    inner+='<line x1="30" y1="6" x2="30" y2="54" stroke="'+c+'" stroke-width="2"/><line x1="6" y1="30" x2="54" y2="30" stroke="'+c+'" stroke-width="2"/>';
    return svgWrap(inner);
  }
  if(s.flag!==undefined){
    let m={right:'<line x1="18" y1="8" x2="18" y2="52" stroke="'+c+'" stroke-width="3" stroke-linecap="round"/><polygon points="18,10 18,30 42,20" fill="'+c+'"/>',
           left:'<line x1="42" y1="8" x2="42" y2="52" stroke="'+c+'" stroke-width="3" stroke-linecap="round"/><polygon points="42,10 42,30 18,20" fill="'+c+'"/>',
           up:'<line x1="8" y1="42" x2="52" y2="42" stroke="'+c+'" stroke-width="3" stroke-linecap="round"/><polygon points="10,42 30,42 20,16" fill="'+c+'"/>',
           down:'<line x1="8" y1="18" x2="52" y2="18" stroke="'+c+'" stroke-width="3" stroke-linecap="round"/><polygon points="10,18 30,18 20,44" fill="'+c+'"/>'};
    return svgWrap(m[s.flag]);
  }
  if(s.circle!==undefined){
    if(s.circle==='fill') return svgWrap('<circle cx="30" cy="30" r="18" fill="'+c+'"/>');
    if(s.circle==='empty') return svgWrap('<circle cx="30" cy="30" r="18" fill="none" stroke="'+c+'" stroke-width="3"/>');
    if(s.circle==='half') return svgWrap('<circle cx="30" cy="30" r="18" fill="none" stroke="'+c+'" stroke-width="3"/><path d="M30 12 A18 18 0 0 0 30 48 Z" fill="'+c+'"/>');
  }
  if(s.csize!==undefined) return svgWrap('<circle cx="30" cy="30" r="'+s.csize+'" fill="none" stroke="'+c+'" stroke-width="3"/>');
  if(s.line!==undefined) return svgWrap('<line x1="8" y1="30" x2="52" y2="30" stroke="'+c+'" stroke-width="4" stroke-linecap="round" transform="rotate('+(-s.line)+' 30 30)"/>');
  if(s.tri!==undefined){
    let m={up:'30,10 50,47 10,47',down:'30,50 50,13 10,13',left:'10,30 47,10 47,50',right:'50,30 13,10 13,50'};
    return svgWrap('<polygon points="'+m[s.tri]+'" fill="'+c+'"/>');
  }
  return '';
}

/* ===== 工具 ===== */
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function sample(a,n){return shuffle(a.slice()).slice(0,n);}
function isFig(o){return typeof o==='object';}
function numOpts(correct,cands){
  const o=[correct];
  for(const c of cands){ if(o.length>=4) break; if(c!==correct && c>0 && o.indexOf(c)<0) o.push(c); }
  let k=1;
  while(o.length<4){ if(correct+k>0 && o.indexOf(correct+k)<0) o.push(correct+k);
    else if(correct-k>0 && o.indexOf(correct-k)<0) o.push(correct-k); k++; if(k>80) break; }
  return o.slice(0,4).map(String);
}

/* ===== 基礎題（精選） ===== */
const BASE={
"語文":[
{q:"「醫生」之於「醫院」，如同「老師」之於下列何者？",o:["學生","學校","課本","粉筆"],a:1,e:"職業與其主要工作場所的關係：醫生在醫院工作，老師在學校工作。"},
{q:"下列何者與「節儉」意思相反？",o:["儉樸","浪費","勤勞","謹慎"],a:1,e:"節儉指用度有節制，相反詞為「浪費」。"},
{q:"「筆」之於「寫字」，如同「剪刀」之於下列何者？",o:["紙張","剪裁","鋒利","文具"],a:1,e:"工具與其功能的關係：筆用來寫字，剪刀用來剪裁。"},
{q:"與「全力以赴」意思最接近的是？",o:["半途而廢","竭盡全力","力不從心","輕而易舉"],a:1,e:"全力以赴＝用盡全部力量去做，與「竭盡全力」同義。"},
{q:"「體重」之於「體重計」，如同「長度」之於下列何者？",o:["公尺","尺","重量","磅秤"],a:1,e:"被測量的量與測量工具的關係：體重用體重計量，長度用尺量。"},
{q:"成語「畫蛇添足」比喻的是？",o:["做事多此一舉，反而壞事","技藝十分高超","做事謹慎周到","半途而廢"],a:0,e:"蛇本無足，硬添上腳，比喻多做了不必要的事反而不好。"},
{q:"「飢餓」之於「食物」，如同「口渴」之於下列何者？",o:["水","杯子","果汁","解渴"],a:0,e:"需求與解決需求之物的關係：飢餓需要食物，口渴需要水。"},
{q:"「春、夏、秋」之後，最適合接的字是？",o:["冬","月","年","季"],a:0,e:"四季順序為春、夏、秋、冬。"},
{q:"「黑」之於「白」，如同「上」之於下列何者？",o:["左","右","下","中"],a:2,e:"相反詞配對：黑配白，上配下。"},
{q:"「蜜蜂」之於「蜂蜜」，如同「乳牛」之於下列何者？",o:["牧草","牛奶","牧場","牛肉"],a:1,e:"生產者與其產出物的關係：蜜蜂產蜂蜜，乳牛產牛奶。"},
{q:"成語「鍥而不捨」形容一個人？",o:["有恆心毅力、堅持到底","做事三心二意","個性膽小怕事","粗心大意"],a:0,e:"鍥而不捨指不停地刻下去，比喻有恆心、堅持不放棄。"},
{q:"「醫生」之於「病人」，如同「律師」之於下列何者？",o:["法官","當事人","法律","法庭"],a:1,e:"專業者與其服務對象的關係：醫生服務病人，律師服務當事人。"},
{q:"「花瓣」之於「花」，如同「樹葉」之於下列何者？",o:["樹根","樹","森林","果實"],a:1,e:"部分與整體的關係：花瓣是花的一部分，樹葉是樹的一部分。"},
{q:"與「高興」意思最接近的是？",o:["愉快","悲傷","憤怒","害怕"],a:0,e:"高興＝心情愉悅，與「愉快」同義。"},
{q:"「教師」之於「學校」，如同「醫師」之於下列何者？",o:["病人","醫院","護士","藥房"],a:1,e:"職業與工作場所的關係：教師在學校，醫師在醫院。"},
{q:"成語「守株待兔」比喻的是？",o:["妄想不勞而獲、坐享其成","勤奮努力不懈","凡事未雨綢繆","隨機應變"],a:0,e:"農夫守著樹樁等兔子撞死，比喻死守經驗、妄想不勞而獲。"},
{q:"「魚」之於「水」，如同「鳥」之於下列何者？",o:["天空","樹木","翅膀","鳥巢"],a:0,e:"生物與其生活環境的關係：魚生活在水中，鳥飛翔於天空。"},
{q:"「鉛筆」之於「文具」，如同「玫瑰」之於下列何者？",o:["花朵","葉子","香味","紅色"],a:0,e:"個體與其所屬類別的關係：鉛筆屬於文具，玫瑰屬於花朵。"},
{q:"「飛機」之於「飛行員」，如同「輪船」之於下列何者？",o:["船長","乘客","海洋","碼頭"],a:0,e:"交通工具與其駕駛者的關係：飛機由飛行員駕駛，輪船由船長駕駛。"},
{q:"與「立刻」意思最接近的是？",o:["馬上","稍後","偶爾","從前"],a:0,e:"立刻＝即時、不延遲，與「馬上」同義。"}
],
"數量":[
{q:"數列：2、4、6、8、（　）。問號處應填？",o:["9","10","11","12"],a:1,e:"每項加 2 的等差數列，8＋2＝10。"},
{q:"數列：1、4、9、16、（　）。問號處應填？",o:["20","24","25","36"],a:2,e:"為 1²、2²、3²、4²…，下一項為 5²＝25。"},
{q:"數列：3、6、12、24、（　）。問號處應填？",o:["36","42","48","30"],a:2,e:"每項乘以 2，24×2＝48。"},
{q:"數列：1、1、2、3、5、8、（　）。問號處應填？",o:["11","12","13","15"],a:2,e:"費氏數列，每項為前兩項之和，5＋8＝13。"},
{q:"數列：2、5、11、23、（　）。問號處應填？",o:["35","44","47","46"],a:2,e:"規律為「乘2加1」：23×2＋1＝47。"},
{q:"一打鉛筆有 12 支，3 打共有幾支？",o:["24","30","36","48"],a:2,e:"12×3＝36 支。"},
{q:"甲、乙同時寫字。甲寫完 60 字時乙寫 30 字；乙寫到 60 字時，甲已寫幾字？",o:["90","100","120","140"],a:2,e:"甲乙速度比 2:1，乙寫 60 字時甲寫 120 字。"},

/* ===== 組合題池：補滿每類 100 題 ===== */
function sigOf(it){return it.q+"|"+JSON.stringify(it.s||0)+"|"+it.o.map(o=>JSON.stringify(o)).sort().join(",");}
function distinctOpts(it){const s=it.o.map(o=>JSON.stringify(o));return new Set(s).size===4 && it.o.length===4;}
function fillPool(base,gens,target){
  const out=base.slice();const sigs=new Set(out.map(sigOf));let tries=0;
  while(out.length<target && tries<60000){
    tries++;const g=pick(gens);let it;try{it=g();}catch(e){it=null;}
    if(!it||!distinctOpts(it)) continue;
    const s=sigOf(it);if(sigs.has(s)) continue;sigs.add(s);out.push(it);
  }
  return out.slice(0,target);
}

/* ===== 狀態與流程 ===== */
const LT=["A","B","C","D"];
const quizEl=document.getElementById('quiz');
const timerEl=document.getElementById('timer');
let ACTIVE=[],answers=[],graded=false,sec=0;

function buildQuiz(){
  ACTIVE=[];
  SECTIONS.forEach(secObj=>{
    const pool=shuffle((POOL[secObj.tag]||[]).slice());
    pool.slice(0,secObj.draw).forEach(item=>{
      const order=shuffle([0,1,2,3]);
      const o=order.map(k=>item.o[k]);
      const a=order.indexOf(item.a);
      ACTIVE.push({cat:secObj.tag,secName:secObj.name,q:item.q,s:item.s,o:o,a:a,e:item.e});
    });
  });
  answers=new Array(ACTIVE.length).fill(null);
  graded=false;sec=0;timerEl.textContent='00:00';
  document.getElementById('totalN').textContent=ACTIVE.length;
  const r=document.getElementById('result');r.classList.remove('show');r.innerHTML='';
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('resetBtn').style.display='none';
  render();updateProgress();
}
function render(){
  let html='',lastCat=null;
  ACTIVE.forEach((item,i)=>{
    if(item.cat!==lastCat){html+='<div class="secttl"><span>'+item.cat+'</span>'+item.secName+'</div>';lastCat=item.cat;}
    html+='<div class="q" id="q'+i+'">';
    html+='<div class="stem"><span class="num">'+(i+1)+'</span>'+item.q+'</div>';
    if(item.s){
      html+='<div class="figrow">';
      item.s.forEach((sp,k)=>{html+='<div class="cell">'+spec2svg(sp)+'</div>';if(k<item.s.length-1)html+='<span class="arrow">→</span>';});
      html+='</div>';
    }
    html+='<div class="opts">';
    item.o.forEach((op,j)=>{const inner=isFig(op)?spec2svg(op):'<span class="txt">'+op+'</span>';
      html+='<div class="opt" data-q="'+i+'" data-o="'+j+'"><span class="ltr">'+LT[j]+'</span>'+inner+'</div>';});
    html+='</div><div class="exp" id="exp'+i+'"></div></div>';
  });
  quizEl.innerHTML=html;
  quizEl.querySelectorAll('.opt').forEach(el=>el.addEventListener('click',onPick));
}
function onPick(e){
  if(graded) return;
  const el=e.currentTarget,qi=+el.dataset.q,oi=+el.dataset.o;
  answers[qi]=oi;
  document.querySelectorAll('#q'+qi+' .opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');updateProgress();
}
function updateProgress(){
  const n=answers.filter(a=>a!==null).length;

/* PR 估計 */
function erf(x){const s=x<0?-1:1;x=Math.abs(x);const t=1/(1+0.3275911*x);const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);return s*y;}
function normCdf(z){return 0.5*(1+erf(z/Math.SQRT2));}
function getPr(){let mean=parseFloat(document.getElementById('prMean').value),sd=parseFloat(document.getElementById('prSd').value);if(!isFinite(mean))mean=70;if(!isFinite(sd)||sd<=0)sd=15;return {mean:mean,sd:sd};}
function estimatePR(score){const g=getPr();let pr=Math.round(normCdf((score-g.mean)/g.sd)*100);pr=Math.max(1,Math.min(99,pr));return {pr:pr,mean:g.mean,sd:g.sd};}
['prMean','prSd'].forEach(id=>{const el=document.getElementById(id);try{const v=localStorage.getItem('iq_'+id);if(v!==null)el.value=v;}catch(e){}el.addEventListener('change',()=>{try{localStorage.setItem('iq_'+id,el.value);}catch(e){}});});

document.getElementById('submitBtn').addEventListener('click',()=>{
  const blank=answers.filter(a=>a===null).length;
  if(!graded && blank>0){if(!confirm('還有 '+blank+' 題未作答，確定要交卷嗎？'))return;}
  grade();
});
function grade(){
  graded=true;
  let correct=0;const cs={語文:0,數量:0,圖形:0,邏輯:0},ct={語文:0,數量:0,圖形:0,邏輯:0};
  ACTIVE.forEach((item,i)=>{
    const qBox=document.getElementById('q'+i);qBox.classList.add('graded');ct[item.cat]++;
    const ok=answers[i]===item.a;if(ok){correct++;cs[item.cat]++;}
    qBox.querySelectorAll('.opt').forEach(o=>{const j=+o.dataset.o;if(j===item.a)o.classList.add('correct');else if(j===answers[i])o.classList.add('wrong');});
    const exp=document.getElementById('exp'+i),your=answers[i]===null?'（未作答）':LT[answers[i]];
    if(ok){exp.classList.remove('bad');exp.innerHTML='<b>✓ 答對</b>　正解：'+LT[item.a]+'。'+item.e;}
    else{exp.classList.add('bad');exp.innerHTML='<b>✗ 答錯</b>　你選 '+your+'，正解：'+LT[item.a]+'。'+item.e;}
  });
  const total=ACTIVE.length,score=Math.round(correct/total*100),pe=estimatePR(score);
  let gd='',tip='';
  if(score>=90){gd='優異 ★★★';tip='推理能力非常出色，繼續保持！';}
  else if(score>=75){gd='良好 ★★';tip='整體表現不錯，針對錯題再加強即可。';}
  else if(score>=60){gd='及格 ★';tip='基礎已具備，建議多練習弱項題型。';}
  else{gd='待加強';tip='別氣餒，看完每題解析再做一次會進步很快。';}
  const r=document.getElementById('result');
  r.innerHTML='<div class="score">'+score+'<small> / 100 分</small></div>'+
    '<div class="grade">'+gd+'　答對 '+correct+'／'+total+' 題</div>'+
    '<div class="pr">估計 PR 值　<b>'+pe.pr+'</b><div class="prnote">依常態分布（平均 '+pe.mean+'、標準差 '+pe.sd+'）換算，為估計值僅供參考，非官方常模。</div></div>'+
    '<div style="color:var(--muted);font-size:14px">作答時間 '+timerEl.textContent+'　·　'+tip+'</div>'+
    '<div class="break">'+['語文','數量','圖形','邏輯'].map(t=>'<div class="b"><div class="t">'+
      ({語文:'語文推理',數量:'數量推理',圖形:'圖形推理',邏輯:'邏輯推理'})[t]+
      '</div><div class="v">'+cs[t]+'<small style="font-size:13px;color:var(--muted)">/'+ct[t]+'</small></div></div>').join('')+'</div>';
  r.classList.add('show');
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('resetBtn').style.display='inline-block';
  r.scrollIntoView({behavior:'smooth'});
}
document.getElementById('resetBtn').addEventListener('click',()=>{buildQuiz();window.scrollTo({top:0,behavior:'smooth'});});

buildQuiz();
</script>
